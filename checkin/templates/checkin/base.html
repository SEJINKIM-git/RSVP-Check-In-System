<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{% block title %}UAC RSVP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        outline: "#926e69",
                        "secondary-container": "#dde3ec",
                        primary: "#9e0000",
                        tertiary: "#4b4c4e",
                        "on-primary-fixed": "#410000",
                        "error-container": "#ffdad6",
                        "surface-tint": "#c00000",
                        "inverse-primary": "#ffb4a8",
                        "on-tertiary-container": "#e2e1e4",
                        "on-tertiary-fixed-variant": "#464749",
                        "outline-variant": "#e8bdb6",
                        surface: "#f9f9f9",
                        "on-error": "#ffffff",
                        background: "#f9f9f9",
                        "on-background": "#1a1c1c",
                        "inverse-surface": "#2f3131",
                        "on-primary-container": "#ffdad4",
                        "tertiary-fixed": "#e3e2e4",
                        "on-secondary-fixed-variant": "#41474e",
                        "surface-container-highest": "#e2e2e2",
                        "on-surface-variant": "#5e3f3a",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#c1c7cf",
                        secondary: "#595f66",
                        "primary-fixed": "#ffdad4",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c8",
                        "on-primary-fixed-variant": "#930000",
                        "tertiary-container": "#636466",
                        "on-tertiary-fixed": "#1a1c1d",
                        "surface-container": "#eeeeee",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#dde3ec",
                        "surface-variant": "#e2e2e2",
                        "surface-container-high": "#e8e8e8",
                        "on-surface": "#1a1c1c",
                        "surface-bright": "#f9f9f9",
                        "primary-container": "#cc0000",
                        "on-primary": "#ffffff",
                        error: "#ba1a1a",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-dim": "#dadada",
                        "primary-fixed-dim": "#ffb4a8",
                        "on-secondary-fixed": "#161c22",
                        "on-secondary-container": "#5f656c",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f3f3f3"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        margin: "32px",
                        md: "16px",
                        xl: "48px",
                        sm: "8px",
                        lg: "24px",
                        gutter: "24px",
                        unit: "4px",
                        xs: "4px",
                        "container-max": "1280px"
                    },
                    fontFamily: {
                        "body-sm": ["Inter"],
                        "headline-md": ["Lexend"],
                        "headline-sm": ["Lexend"],
                        "label-md": ["Inter"],
                        "display-xl": ["Lexend"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Lexend"],
                        "display-lg": ["Lexend"]
                    },
                    fontSize: {
                        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "headline-sm": ["20px", { lineHeight: "1.3", fontWeight: "600" }],
                        "label-md": ["14px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "label-sm": ["12px", { lineHeight: "1", fontWeight: "500" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "0", fontWeight: "700" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
        }

        .font-lexend {
            font-family: 'Lexend', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .shadow-ambient {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body class="bg-background text-on-background font-body-md antialiased overflow-x-hidden">
    <header class="bg-white dark:bg-slate-900 flex justify-between items-center px-6 h-16 w-full sticky top-0 z-40 shadow-sm border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-4">
            <a class="font-lexend text-[32px] font-black tracking-tight text-red-700 dark:text-red-500" href="{% url 'checkin:dashboard' %}">UAC RSVP</a>
        </div>
    </header>

    <div class="flex min-h-[calc(100vh-64px)]">
        <aside class="hidden lg:flex flex-col gap-1 bg-gray-50 dark:bg-slate-950 h-[calc(100vh-64px)] w-64 border-r border-gray-200 dark:border-gray-800 sticky left-0 top-16 p-4 pt-7 font-lexend text-sm">
            <div class="mb-6 px-6">
                <p class="font-bold text-red-700">Check-In System</p>
                <p class="text-xs text-gray-500">University of Utah</p>
            </div>
            <nav class="flex flex-col gap-1">
                <a class="{% if active_nav == 'dashboard' %}bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 font-semibold{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-900{% endif %} mx-2 px-4 py-3 flex items-center gap-3 rounded-lg transition-all duration-200 ease-in-out" href="{% url 'checkin:dashboard' %}">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Dashboard</span>
                </a>
                <a class="{% if active_nav == 'registered' %}bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 font-semibold{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-900{% endif %} mx-2 px-4 py-3 flex items-center gap-3 rounded-lg transition-all duration-200 ease-in-out" href="{% url 'checkin:registered_checkin' %}">
                    <span class="material-symbols-outlined">assignment_turned_in</span>
                    <span>Check-In</span>
                </a>
                <a class="{% if active_nav == 'guest' %}bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 font-semibold{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-900{% endif %} mx-2 px-4 py-3 flex items-center gap-3 rounded-lg transition-all duration-200 ease-in-out" href="{% url 'checkin:guest_checkin' %}">
                    <span class="material-symbols-outlined">group</span>
                    <span>Guest Regs.</span>
                </a>
                <a class="{% if active_nav == 'data_tools' %}bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 font-semibold{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-900{% endif %} mx-2 px-4 py-3 flex items-center gap-3 rounded-lg transition-all duration-200 ease-in-out" href="{% url 'checkin:import_rsvp' %}">
                    <span class="material-symbols-outlined">import_export</span>
                    <span>Data Tools</span>
                </a>
            </nav>
        </aside>

        <main class="{% block main_classes %}flex-1 lg:ml-0 p-margin lg:p-xl space-y-xl max-w-7xl w-full pb-24 lg:pb-xl{% endblock %}">
            {% block content %}{% endblock %}
        </main>
    </div>

    <nav class="lg:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-2 pb-6 bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] font-lexend text-[10px] font-medium">
        <a class="{% if active_nav == 'dashboard' %}text-red-700 bg-red-50 rounded-xl px-4 py-1 scale-95{% else %}text-gray-500{% endif %} flex flex-col items-center justify-center transition-transform" href="{% url 'checkin:dashboard' %}">
            <span class="material-symbols-outlined">home</span>
            <span>Home</span>
        </a>
        <a class="{% if active_nav == 'registered' %}text-red-700 bg-red-50 rounded-xl px-4 py-1 scale-95{% else %}text-gray-500{% endif %} flex flex-col items-center justify-center transition-transform" href="{% url 'checkin:registered_checkin' %}">
            <span class="material-symbols-outlined">qr_code</span>
            <span>Scan</span>
        </a>
        <a class="{% if active_nav == 'guest' %}text-red-700 bg-red-50 rounded-xl px-4 py-1 scale-95{% else %}text-gray-500{% endif %} flex flex-col items-center justify-center transition-transform" href="{% url 'checkin:guest_checkin' %}">
            <span class="material-symbols-outlined">person_add_alt</span>
            <span>Guests</span>
        </a>
        <a class="{% if active_nav == 'data_tools' %}text-red-700 bg-red-50 rounded-xl px-4 py-1 scale-95{% else %}text-gray-500{% endif %} flex flex-col items-center justify-center transition-transform" href="{% url 'checkin:import_rsvp' %}">
            <span class="material-symbols-outlined">settings</span>
            <span>Tools</span>
        </a>
    </nav>

    {% block scripts %}{% endblock %}
</body>
</html>
