<tr id="row-{{ participant.id }}"
    class="hover:bg-gray-50 transition-colors group"
    data-name="{{ participant.name|lower }}"
    data-unid="{{ participant.unid|lower }}"
    data-major="{{ participant.major|lower }}">

    <td class="px-lg py-md">
        <div class="flex items-center gap-md">
            <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-primary font-bold flex-shrink-0">
                {{ participant.name|slice:":1"|upper }}
            </div>
            <span class="text-[16px] font-semibold text-on-surface">{{ participant.name }}</span>
        </div>
    </td>

    <td class="px-lg py-md text-[16px] font-mono text-secondary">{{ participant.unid|lower }}</td>

    <td class="px-lg py-md">
        <span class="text-[16px] text-secondary">{{ participant.major }}</span>
    </td>

    <td class="px-lg py-md">
        <button
            type="button"
            hx-post="{% url 'checkin:toggle_checkin' participant.id %}"
            hx-target="#row-{{ participant.id }}"
            hx-swap="outerHTML"
            hx-indicator="#row-{{ participant.id }}"
            class="inline-flex items-center gap-sm rounded-lg px-sm py-xs transition-all active:scale-95 [&.htmx-request]:opacity-40 [&.htmx-request]:cursor-wait"
            aria-label="Toggle check-in for {{ participant.name }}"
        >
            {% if participant.checked_in %}
                <span class="w-6 h-6 rounded flex-shrink-0 flex items-center justify-center bg-primary text-white">
                    <span class="material-symbols-outlined text-[16px]">check</span>
                </span>
                <span class="font-semibold text-primary text-[15px]">Checked In</span>
                <span class="text-[11px] text-secondary font-normal ml-xs hidden group-hover:inline">tap to undo</span>
            {% else %}
                <span class="w-6 h-6 rounded flex-shrink-0 border-2 border-gray-300 bg-white group-hover:border-primary transition-colors"></span>
                <span class="font-medium text-secondary text-[15px] group-hover:text-on-surface">Pending</span>
            {% endif %}
        </button>
    </td>
</tr>

{% if is_htmx %}
<span id="stat-checked-in-total" hx-swap-oob="true">{{ checked_in_total }}</span>
{% endif %}
