<button
    type="button"
    hx-post="{% url 'checkin:toggle_checkin' participant.id %}"
    hx-target="#checkin-cell-{{ participant.id }}"
    hx-swap="innerHTML show:none focus-scroll:false"
    aria-pressed="{% if participant.checked_in %}true{% else %}false{% endif %}"
    class="group inline-flex min-w-[7.5rem] items-center justify-start gap-sm whitespace-nowrap rounded-lg px-sm py-xs transition-all active:scale-95 [&.htmx-request]:opacity-40 [&.htmx-request]:cursor-wait"
    aria-label="Toggle check-in for {{ participant.name|default:participant.unid }}"
>
    {% if participant.checked_in %}
        <span class="w-6 h-6 rounded flex-shrink-0 flex items-center justify-center bg-primary text-white">
            <span class="material-symbols-outlined text-[16px]">check</span>
        </span>
        <span class="font-semibold text-primary text-[15px]">Checked In</span>
    {% else %}
        <span class="w-6 h-6 rounded flex-shrink-0 border-2 border-gray-300 bg-white transition-colors group-hover:border-primary"></span>
        <span class="font-medium text-secondary text-[15px] group-hover:text-on-surface">Pending</span>
    {% endif %}
</button>

{% if is_htmx %}
<span id="stat-checked-in-total" hx-swap-oob="true" class="text-display-lg font-display-xl text-primary">{{ checked_in_total }}</span>
{% endif %}
